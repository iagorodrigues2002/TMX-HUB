services:
  redis:
    image: redis:7-alpine
    container_name: page-cloner-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: page-cloner-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    container_name: page-cloner-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/clones &&
      mc anonymous set download local/clones &&
      echo 'bucket clones ready'
      "
    restart: "no"

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    container_name: page-cloner-api
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      API_PORT: 4000
      API_HOST: 0.0.0.0
      LOG_LEVEL: info
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: clones
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_FORCE_PATH_STYLE: "true"
      MAX_RENDER_TIMEOUT_MS: 90000
      MAX_ASSET_BYTES: 26214400
      MAX_TOTAL_BYTES: 262144000
      BROWSER_POOL_SIZE: 3
      WEBHOOK_SECRET: dev-webhook-secret-change-me-in-production
      PUBLIC_BASE_URL: http://localhost:4000
    ports:
      - "4000:4000"
    restart: unless-stopped

volumes:
  minio-data:
